<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | AuraPK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #d4af37;
            --accent: #e94560;
            --light: #f8f8f8;
            --dark: #0f0f0f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--light);
            color: var(--dark);
        }

        /* Header */
        .cart-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 1.5rem 0;
        }

        .cart-header .logo {
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
        }

        .cart-header .logo i {
            color: var(--gold);
            margin-right: 0.5rem;
        }

        /* Cart Container */
        .cart-container {
            padding: 3rem 0;
        }

        .cart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        /* Cart Items */
        .cart-card {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .cart-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .cart-card h3 i {
            color: var(--gold);
        }

        .cart-item {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem 0;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-image {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            object-fit: cover;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-details h5 {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .cart-item-details .price {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--light);
            padding: 0.5rem;
            border-radius: 8px;
        }

        .qty-controls button {
            width: 30px;
            height: 30px;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .qty-controls button:hover {
            background: var(--gold);
        }

        .qty-controls span {
            min-width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .remove-btn:hover {
            color: #bd2130;
            transform: scale(1.1);
        }

        /* Empty Cart */
        .empty-cart {
            text-align: center;
            padding: 3rem;
        }

        .empty-cart i {
            font-size: 4rem;
            color: #ddd;
            margin-bottom: 1rem;
        }

        .empty-cart h4 {
            color: #666;
            margin-bottom: 1rem;
        }

        .empty-cart .btn-shop {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: var(--gold);
            color: var(--primary);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .empty-cart .btn-shop:hover {
            background: var(--accent);
            color: white;
        }

        /* Summary Card */
        .summary-card {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .summary-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .summary-card h3 i {
            color: var(--gold);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            color: #666;
        }

        .summary-row.total {
            border-top: 2px solid var(--primary);
            margin-top: 0.5rem;
            padding-top: 1rem;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .btn-checkout {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #d4af37, #b8962e);
            color: var(--primary);
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .btn-checkout:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }

        .btn-continue {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .btn-continue:hover {
            color: var(--gold);
        }

        @media (max-width: 992px) {
            .cart-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 576px) {
            .cart-item {
                flex-direction: column;
                text-align: center;
            }
            
            .cart-item-image {
                width: 100%;
                height: 150px;
            }
            
            .cart-item-actions {
                justify-content: center;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="cart-header">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-spray-can"></i>
                Aura<span style="color: var(--gold);">PK</span>
            </a>
        </div>
    </header>

    <!-- Cart Container -->
    <div class="cart-container">
        <div class="container">
            <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 2rem; color: var(--primary);">
                <i class="fas fa-shopping-cart" style="color: var(--gold);"></i> Shopping Cart
            </h2>
            
            <div class="cart-grid" id="cartGrid">
                <!-- Cart Items -->
                <div class="cart-card">
                    <h3><i class="fas fa-box"></i> Your Items</h3>
                    <div id="cartItems">
                        <!-- Cart items will be loaded here -->
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="summary-card">
                    <h3><i class="fas fa-receipt"></i> Order Summary</h3>
                    
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">Rs 0</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>Free</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery Time</span>
                        <span>3-5 Days</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="total">Rs 0</span>
                    </div>

                    <button class="btn-checkout" onclick="proceedToCheckout()">
                        <i class="fas fa-shopping-bag"></i> Proceed to Checkout
                    </button>
                    
                    <a href="index.html" class="btn-continue">
                        <i class="fas fa-arrow-left"></i> Continue Shopping
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cart data - stored in localStorage
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        // Product images mapping
        const productImages = {
            'Royal Oud': 'https://images.unsplash.com/photo-1594035910387-fea47794261f?w=400',
            'Aqua Essence': 'https://images.unsplash.com/photo-1594035910387-fea47794261f?w=400',
            'Velvet Rose': 'https://images.unsplash.com/photo-1541643600914-78b084683601?w=400',
            'Midnight Velvet': 'https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=400',
            'Citrus Bloom': 'https://images.unsplash.com/photo-1615634260167-c8cdede054de?w=400',
            'Vanilla Sky': 'https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=400',
            'Blossom Paradise': 'https://images.unsplash.com/photo-1541643600914-78b084683601?w=400',
            'Spring Breeze': 'https://images.unsplash.com/photo-1594035910387-fea47794261f?w=400',
            'Midnight Amber': 'https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=400',
            'Pink Symphony': 'https://images.unsplash.com/photo-1615634260167-c8cdede054de?w=400',
            'Woodland Elite': 'https://images.unsplash.com/photo-1587017539504-67cfbddac569?w=400',
            'Spice Imperial': 'https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=400',
            'Signature Oud': 'https://images.unsplash.com/photo-1587017539504-67cfbddac569?w=400',
            'Clean Breeze': 'https://images.unsplash.com/photo-1594035910387-fea47794261f?w=400',
            'Zest Supreme': 'https://images.unsplash.com/photo-1615634260167-c8cdede054de?w=400',
            'Mystic Amber': 'https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=400',
            'Earth & Wood': 'https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=400',
            'Cloud Nine': 'https://images.unsplash.com/photo-1541643600914-78b084683601?w=400'
        };

        // Render cart items
        function renderCart() {
            const cartItemsContainer = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-basket"></i>
                        <h4>Your cart is empty</h4>
                        <p>Add some products to get started!</p>
                        <a href="index.html" class="btn-shop">Start Shopping</a>
                    </div>
                `;
                updateSummary();
                return;
            }

            let html = '';
            let total = 0;

            cart.forEach((item, index) => {
                const image = productImages[item.name] || 'https://images.unsplash.com/photo-1541643600914-78b084683601?w=400';
                const itemTotal = item.price * item.qty;
                total += itemTotal;

                html += `
                    <div class="cart-item">
                        <img src="${image}" alt="${item.name}" class="cart-item-image">
                        <div class="cart-item-details">
                            <h5>${item.name}</h5>
                            <p class="price">Rs ${item.price.toLocaleString()}</p>
                        </div>
                        <div class="cart-item-actions">
                            <div class="qty-controls">
                                <button onclick="updateQty(${index}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button onclick="updateQty(${index}, 1)">+</button>
                            </div>
                            <button class="remove-btn" onclick="removeItem(${index})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });

            cartItemsContainer.innerHTML = html;
            updateSummary();
        }

        // Update quantity
        function updateQty(index, change) {
            cart[index].qty += change;
            if (cart[index].qty < 1) {
                cart.splice(index, 1);
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        // Remove item
        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        // Update summary
        function updateSummary() {
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.qty;
            });

            document.getElementById('subtotal').textContent = 'Rs ' + total.toLocaleString();
            document.getElementById('total').textContent = 'Rs ' + total.toLocaleString();
        }

        // Proceed to checkout
        function proceedToCheckout() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }

            // If single item, go to checkout with that item
            if (cart.length === 1) {
                const item = cart[0];
                const image = productImages[item.name] || 'https://images.unsplash.com/photo-1541643600914-78b084683601?w=400';
                window.location.href = `checkout.html?product=${encodeURIComponent(item.name)}&price=${item.price}&image=${encodeURIComponent(image)}`;
            } else {
                // For multiple items, we'll create a summary
                alert('For multiple items, please contact us on WhatsApp!');
            }
        }

        // Initialize
        renderCart();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
